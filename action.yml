name: Swatter
description: >-
  PR-review bugbot — validated findings + a living rule book, on agentcore.
  BYOK: bring an Anthropic key or point at any OpenAI-compatible gateway.
author: lohi-ai
branding:
  icon: alert-triangle
  color: red

inputs:
  mode:
    description: >-
      Subcommand: 'run' (default — review a PR) or 'learn' (post-merge feedback
      → rule book). Use 'learn' from a scheduled workflow with learn_since set.
    required: false
    default: run
  learn_since:
    description: >-
      learn mode only: scan every PR merged within this lookback window (Go
      duration, e.g. 72h). Overlap the schedule interval — scoring is idempotent
      per PR, so a missed run self-heals. Empty = single-PR mode (needs an event).
    required: false
    default: ''
  api_key:
    description: BYOK inference key (Anthropic key, or the gateway key for openai-compat). Store as a secret.
    required: true
  provider:
    description: 'anthropic (default) | openai-compat'
    required: false
    default: anthropic
  base_url:
    description: OpenAI-compatible gateway base URL (required for provider openai-compat — 9router, OpenRouter, LiteLLM, Ollama, …).
    required: false
    default: ''
  model:
    description: Strong model id for bug/security angles and large diffs.
    required: false
    default: ''
  model_cheap:
    description: Cheaper model id used for cleanup/conformance angles on small diffs. Defaults to `model`.
    required: false
    default: ''
  effort:
    description: >-
      Review level: auto (default — size the level from the diff: ≤3 files &
      ≤50 lines → low, ≤10 & ≤300 → medium, ≤25 & ≤1000 → high, larger →
      xhigh) | low (1 diff pass, no verify, ≤4 findings) | medium (3+5 angles ×
      6 → verify → ≤8, precision) | high (same fan-out, recall-biased → ≤10) |
      xhigh (5+5 angles × 8 → verify → sweep → ≤15) | max (xhigh + API
      reasoning effort). Each level also hard-caps every role agent's tokens
      (high stays under 120K per agent).
    required: false
    default: auto
  fail_on:
    description: 'Check-run red threshold: never (default, advisory — green check + comments) | critical | major | any.'
    required: false
    default: never
  briefing:
    description: 'LLM reviewer briefing (summary + walkthrough + quiz) on the review comment. true (default) | false to skip the extra model call.'
    required: false
    default: 'true'
  max_usd:
    description: Per-PR spend ceiling (uses agentcore pricing for known models).
    required: false
    default: '5'
  max_tokens_total:
    description: Per-PR token ceiling — the always-works backstop for unknown-priced gateway models.
    required: false
    default: '8000000'
  price_per_mtok_in:
    description: Optional input $/Mtok for a custom gateway model so max_usd meters it too.
    required: false
    default: '0'
  price_per_mtok_out:
    description: Optional output $/Mtok for a custom gateway model.
    required: false
    default: '0'
  rules_commit:
    description: >-
      Post-merge learn flow only (pull_request `closed` + merged): commit the
      updated .swatter/{rules,pending}.md to the base branch via the Contents
      API (needs `contents: write`). 'false' computes and prints instead.
    required: false
    default: 'true'
  rule_promote_after:
    description: Observation weight a same-pattern cluster needs before it becomes a rule (missed-bug evidence weighs 2, repeats 1; always requires ≥2 distinct PRs).
    required: false
    default: '3'
  bot_login:
    description: >-
      Post-merge learn flow only: the GitHub login Swatter's own comments are
      authored by. Feedback is only scored from findings by this author, so a PR
      participant can't forge it by pasting the finding marker. Defaults to the
      Actions bot; set this if you post with a custom App/PAT.
    required: false
    default: 'github-actions[bot]'
  github_token:
    description: Token for posting the check run + comments. Defaults to the workflow GITHUB_TOKEN.
    required: false
    default: ${{ github.token }}
  resolve_token:
    description: >-
      Optional PAT (or App token) with pull-requests write used ONLY to resolve
      stale review threads when a finding is fixed across review rounds. The
      default GITHUB_TOKEN cannot resolve threads ("Resource not accessible by
      integration"), so without this, fixed findings' threads stay open (dedup
      of persistent findings still works). Pass a secret, e.g.
      ${{ secrets.SWATTER_RESOLVE_TOKEN }}.
    required: false
    default: ''

outputs:
  findings:
    description: JSON array of validated findings.
  finding_count:
    description: Number of findings reported.

runs:
  using: docker
  image: docker://ghcr.io/lohi-ai/swatter:v0
  args:
    - ${{ inputs.mode }}
  env:
    SWATTER_LEARN_SINCE: ${{ inputs.learn_since }}
    SWATTER_API_KEY: ${{ inputs.api_key }}
    SWATTER_PROVIDER: ${{ inputs.provider }}
    SWATTER_BASE_URL: ${{ inputs.base_url }}
    SWATTER_MODEL: ${{ inputs.model }}
    SWATTER_MODEL_CHEAP: ${{ inputs.model_cheap }}
    SWATTER_EFFORT: ${{ inputs.effort }}
    SWATTER_FAIL_ON: ${{ inputs.fail_on }}
    SWATTER_BRIEFING: ${{ inputs.briefing }}
    SWATTER_MAX_USD: ${{ inputs.max_usd }}
    SWATTER_MAX_TOKENS_TOTAL: ${{ inputs.max_tokens_total }}
    SWATTER_PRICE_PER_MTOK_IN: ${{ inputs.price_per_mtok_in }}
    SWATTER_PRICE_PER_MTOK_OUT: ${{ inputs.price_per_mtok_out }}
    SWATTER_RULES_COMMIT: ${{ inputs.rules_commit }}
    SWATTER_RULE_PROMOTE_AFTER: ${{ inputs.rule_promote_after }}
    SWATTER_BOT_LOGIN: ${{ inputs.bot_login }}
    SWATTER_GITHUB_TOKEN: ${{ inputs.github_token }}
    SWATTER_RESOLVE_TOKEN: ${{ inputs.resolve_token }}
    SWATTER_REPO_ROOT: /github/workspace
