name: release-image

# Publishes the Swatter runner image to GHCR. A version tag (v1.2.3) also moves
# the floating major tag (v1) that action.yml pins, so `uses: lohi-ai/swatter@v1`
# gets patches without re-pinning.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          ref="${GITHUB_REF_NAME}"
          major="${ref%%.*}"   # v1.2.3 -> v1
          {
            echo "tags<<EOF"
            echo "ghcr.io/lohi-ai/swatter:${ref}"
            echo "ghcr.io/lohi-ai/swatter:${major}"
            echo "ghcr.io/lohi-ai/swatter:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
