name: swatter
on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: swatter-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event.issue.pull_request &&
       contains(github.event.comment.body, '@swatter review') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}
      - id: swatter
        uses: lohi-ai/swatter@v0
        with:
          api_key: ${{ secrets.SWATTER_API_KEY }}
          provider: openai-compat
          base_url: https://ai.lohi2.com/v1
          model: pro
          # PAT with pull-requests write, used only to resolve stale threads
          # (GITHUB_TOKEN can't). Optional — resolve stays skipped while empty.
          resolve_token: ${{ secrets.SWATTER_RESOLVE_TOKEN }}
